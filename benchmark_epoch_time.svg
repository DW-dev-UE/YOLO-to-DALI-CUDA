<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="cv2grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="daligrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="400" rx="12" fill="#0d1117"/>

  <!-- title -->
  <text x="400" y="38" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="16" font-weight="600">Total Epoch Time (seconds) -- Lower is Better</text>

  <!-- legend -->
  <rect x="270" y="52" width="12" height="12" rx="2" fill="url(#cv2grad)"/>
  <text x="288" y="63" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12">CV2 Dataloader</text>
  <rect x="410" y="52" width="12" height="12" rx="2" fill="url(#daligrad)"/>
  <text x="428" y="63" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12">DALI Pipeline</text>

  <!-- grid lines -->
  <line x1="140" y1="85" x2="760" y2="85" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="155" x2="760" y2="155" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="225" x2="760" y2="225" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="295" x2="760" y2="295" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="365" x2="760" y2="365" stroke="#21262d" stroke-width="1"/>

  <!-- Y axis scale labels -->
  <text x="130" y="89" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">200s</text>
  <text x="130" y="159" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">150s</text>
  <text x="130" y="229" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">100s</text>
  <text x="130" y="299" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">50s</text>
  <text x="130" y="369" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">0s</text>

  <!-- baseline -->
  <line x1="140" y1="365" x2="760" y2="365" stroke="#30363d" stroke-width="2"/>

  <!-- Detect: CV2=200.05 DALI=182.83 -->
  <!-- bar height: value / 200 * 280 -->
  <!-- CV2: 200.05/200*280 = 280.07 -> y=365-280=85 -->
  <rect x="170" y="84.93" width="55" height="280.07" rx="4" fill="url(#cv2grad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="197" y="79" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">200.1s</text>
  <!-- DALI: 182.83/200*280 = 255.96 -> y=365-256=109 -->
  <rect x="230" y="109.04" width="55" height="255.96" rx="4" fill="url(#daligrad)" filter="url(#shadow)"/>
  <text x="257" y="103" text-anchor="middle" fill="#4ade80" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">182.8s</text>
  <!-- delta label -->
  <text x="227" y="382" text-anchor="middle" fill="#f97316" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700">-8.6%</text>
  <!-- task label -->
  <text x="227" y="397" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">Detect</text>

  <!-- OBB: CV2=96.08 DALI=92.71 -->
  <!-- CV2: 96.08/200*280 = 134.51 -> y=365-134.51=230.49 -->
  <rect x="330" y="230.49" width="55" height="134.51" rx="4" fill="url(#cv2grad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="357" y="224" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">96.1s</text>
  <!-- DALI: 92.71/200*280 = 129.79 -> y=365-129.79=235.21 -->
  <rect x="390" y="235.21" width="55" height="129.79" rx="4" fill="url(#daligrad)" filter="url(#shadow)"/>
  <text x="417" y="229" text-anchor="middle" fill="#4ade80" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">92.7s</text>
  <text x="387" y="382" text-anchor="middle" fill="#f97316" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700">-3.5%</text>
  <text x="387" y="397" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">OBB</text>

  <!-- Segment: CV2=70.57 DALI=70.00 -->
  <!-- CV2: 70.57/200*280 = 98.80 -> y=365-98.80=266.20 -->
  <rect x="490" y="266.20" width="55" height="98.80" rx="4" fill="url(#cv2grad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="517" y="260" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">70.6s</text>
  <!-- DALI: 70.00/200*280 = 98.00 -> y=365-98=267 -->
  <rect x="550" y="267" width="55" height="98" rx="4" fill="url(#daligrad)" filter="url(#shadow)"/>
  <text x="577" y="261" text-anchor="middle" fill="#4ade80" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">70.0s</text>
  <text x="547" y="382" text-anchor="middle" fill="#f97316" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700">-0.8%</text>
  <text x="547" y="397" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">Segment</text>

  <!-- Classify: CV2=80.50 DALI=79.40 -->
  <!-- CV2: 80.50/200*280 = 112.70 -> y=365-112.70=252.30 -->
  <rect x="650" y="252.30" width="55" height="112.70" rx="4" fill="url(#cv2grad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="677" y="246" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">80.5s</text>
  <!-- DALI: 79.40/200*280 = 111.16 -> y=365-111.16=253.84 -->
  <rect x="710" y="253.84" width="55" height="111.16" rx="4" fill="url(#daligrad)" filter="url(#shadow)"/>
  <text x="737" y="248" text-anchor="middle" fill="#4ade80" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">79.4s</text>
  <text x="707" y="382" text-anchor="middle" fill="#f97316" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700">-1.3%</text>
  <text x="707" y="397" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">Classify</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="cv2grad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b7280"/>
      <stop offset="100%" stop-color="#9ca3af"/>
    </linearGradient>
    <linearGradient id="daligrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="400" rx="12" fill="#0d1117"/>

  <text x="400" y="38" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="16" font-weight="600">Throughput (img/s) -- Higher is Better</text>

  <rect x="270" y="52" width="12" height="12" rx="2" fill="url(#cv2grad2)"/>
  <text x="288" y="63" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12">CV2 Dataloader</text>
  <rect x="410" y="52" width="12" height="12" rx="2" fill="url(#daligrad2)"/>
  <text x="428" y="63" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12">DALI Pipeline</text>

  <!-- grid: max ~160 img/s, scale 160 -->
  <line x1="140" y1="85" x2="760" y2="85" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="155" x2="760" y2="155" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="225" x2="760" y2="225" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="295" x2="760" y2="295" stroke="#21262d" stroke-width="1"/>
  <line x1="140" y1="365" x2="760" y2="365" stroke="#30363d" stroke-width="2"/>

  <text x="130" y="89" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">160</text>
  <text x="130" y="159" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">120</text>
  <text x="130" y="229" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">80</text>
  <text x="130" y="299" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">40</text>
  <text x="130" y="369" text-anchor="end" fill="#6b7280" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11">0</text>

  <!-- Detect: CV2=147.21 DALI=147.48 -->
  <!-- height = val/160*280 -->
  <!-- CV2: 147.21/160*280 = 257.62 -> y=365-257.62=107.38 -->
  <rect x="170" y="107.38" width="55" height="257.62" rx="4" fill="url(#cv2grad2)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="197" y="101" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">147.2</text>
  <!-- DALI: 147.48/160*280 = 258.09 -> y=365-258.09=106.91 -->
  <rect x="230" y="106.91" width="55" height="258.09" rx="4" fill="url(#daligrad2)" filter="url(#shadow2)"/>
  <text x="257" y="101" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">147.5</text>
  <text x="227" y="392" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">Detect</text>

  <!-- OBB: CV2=97.32 DALI=104.79 -->
  <!-- CV2: 97.32/160*280 = 170.31 -> y=365-170.31=194.69 -->
  <rect x="330" y="194.69" width="55" height="170.31" rx="4" fill="url(#cv2grad2)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="357" y="189" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">97.3</text>
  <!-- DALI: 104.79/160*280 = 183.38 -> y=365-183.38=181.62 -->
  <rect x="390" y="181.62" width="55" height="183.38" rx="4" fill="url(#daligrad2)" filter="url(#shadow2)"/>
  <text x="417" y="176" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">104.8</text>
  <text x="387" y="392" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">OBB</text>

  <!-- Segment: CV2=44.41 DALI=44.46 -->
  <!-- CV2: 44.41/160*280 = 77.72 -> y=365-77.72=287.28 -->
  <rect x="490" y="287.28" width="55" height="77.72" rx="4" fill="url(#cv2grad2)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="517" y="281" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">44.4</text>
  <!-- DALI: 44.46/160*280 = 77.81 -> y=365-77.81=287.19 -->
  <rect x="550" y="287.19" width="55" height="77.81" rx="4" fill="url(#daligrad2)" filter="url(#shadow2)"/>
  <text x="577" y="281" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">44.5</text>
  <text x="547" y="392" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">Segment</text>

  <!-- Classify: CV2=11.76 DALI=12.67 -->
  <!-- CV2: 11.76/160*280 = 20.58 -> y=365-20.58=344.42 -->
  <rect x="650" y="344.42" width="55" height="20.58" rx="4" fill="url(#cv2grad2)" filter="url(#shadow2)" opacity="0.9"/>
  <text x="677" y="338" text-anchor="middle" fill="#9ca3af" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">11.8</text>
  <!-- DALI: 12.67/160*280 = 22.17 -> y=365-22.17=342.83 -->
  <rect x="710" y="342.83" width="55" height="22.17" rx="4" fill="url(#daligrad2)" filter="url(#shadow2)"/>
  <text x="737" y="337" text-anchor="middle" fill="#60a5fa" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600">12.7</text>
  <text x="707" y="392" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="600">Classify</text>
</svg>
